<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLauncher - Thanks for downloading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Sora:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./icon.ico">
    <style>
        .thanks-wrap {
            max-width: 580px;
            margin: 0 auto;
            padding: 140px 24px 80px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .thanks-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px;
        }

        .thanks-title {
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 14px;
        }

        .thanks-sub {
            font-size: 15px;
            color: var(--text2);
            font-weight: 300;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .thanks-steps {
            text-align: left;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .thanks-steps-label {
            font-size: 10px;
            font-family: var(--mono);
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 14px 18px 10px;
            border-bottom: 1px solid var(--border);
        }

        .thanks-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text2);
            line-height: 1.5;
        }

        .thanks-step:last-child {
            border-bottom: none;
        }

        .thanks-step-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-family: var(--mono);
            color: var(--text3);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .thanks-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thanks-retry {
            font-size: 12px;
            color: var(--text3);
            font-family: var(--mono);
            margin-top: 20px;
        }

        .thanks-retry a {
            color: #60a5fa;
            text-decoration: none;
        }

        .thanks-retry a:hover {
            text-decoration: underline;
        }

        .thanks-step a {
            color: #60a5fa;
            text-decoration: none;
            border-bottom: 1px solid #1e3a8a;
            transition: border-color 0.15s, color 0.15s;
        }

        .thanks-step a:hover {
            color: #93c5fd;
            border-color: #60a5fa;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" class="nav-logo">
            <svg class="nav-logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="28" height="28" rx="6" fill="#0a0a0c" />
                <rect x="0.5" y="0.5" width="27" height="27" rx="5.5" stroke="#1e1e24" />
                <path d="M 20 7.5 A 7.5 7.5 0 1 0 20 20.5" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"
                    fill="none" />
                <circle cx="20" cy="7.5" r="1.5" fill="#2563eb" />
                <circle cx="20" cy="20.5" r="1.5" fill="#2563eb" />
            </svg>
            <span class="nav-logo-text">CLauncher</span>
        </a>
        <ul class="nav-links">
            <li><a href="/#features">features</a></li>
            <li><a href="/#download">download</a></li>
            <li><a href="/#changelog">changelog</a></li>
        </ul>
        <a href="/#download" class="nav-download">
            <i class="ti ti-download" style="font-size:14px"></i>
            download
        </a>
    </nav>

    <div class="thanks-wrap">
        <div class="thanks-icon" id="thanksIcon"></div>
        <h1 class="thanks-title" id="thanksTitle">Thanks for downloading!</h1>
        <p class="thanks-sub" id="thanksSub"></p>

        <div class="thanks-steps" id="thanksSteps"></div>

        <div class="thanks-actions">
            <a href="/" class="btn-ghost">
                <i class="ti ti-home" style="font-size:14px"></i>
                back to home
            </a>
            <a href="https://github.com/Cirax856/clauncher/issues" target="_blank" class="btn-ghost">
                <i class="ti ti-brand-github" style="font-size:14px"></i>
                report an issue
            </a>
        </div>

        <p class="thanks-retry" id="thanksRetry"></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search)
        const platform = params.get('platform') || 'windows'
        const version = params.get('v') || '2.0.1'

        const config = {
            windows: {
                icon: '<i class="ti ti-brand-windows"></i>',
                iconStyle: 'background:#041218;border:1px solid #164e63;color:#06b6d4',
                sub: `Your download of CLauncher ${version} for Windows should have started. Run the installer to get started.`,
                steps: [
                    { text: 'Run <strong>CLauncher.exe</strong>' },
                    { text: 'The installer will add CLauncher to your Start Menu' },
                    { text: 'Windows may show a SmartScreen warning - click <strong>More info → Run anyway</strong>' },
                    { text: 'Launch CLauncher and add your first game' },
                ],
                retry: 'CLauncher.exe',
                retryUrl: 'https://cdn.cirax.dev/clauncher/CLauncher.exe',
            },
            linux: {
                icon: '<i class="ti ti-brand-debian"></i>',
                iconStyle: 'background:#0f0500;border:1px solid #7c2d12;color:#f97316',
                sub: `Your download of CLauncher ${version} AppImage for Linux should have started.`,
                steps: [
                    { text: 'Move <strong>CLauncher.AppImage</strong> somewhere permanent, e.g. <code style="font-family:var(--mono);color:#60a5fa;font-size:12px">~/.local/bin/</code>' },
                    { text: 'Make it executable: <code style="font-family:var(--mono);color:#60a5fa;font-size:12px">chmod +x CLauncher.AppImage</code>' },
                    { text: 'Run it by double-clicking or from the terminal' },
                    { text: 'If it doesn\'t launch, you may need <code style="font-family:var(--mono);color:#60a5fa;font-size:12px">libfuse2</code> - see the <a href="/linux-guide.html">Linux guide</a>' },
                ],
                retry: 'CLauncher.AppImage',
                retryUrl: 'https://cdn.cirax.dev/clauncher/CLauncher.AppImage',
            },
        }

        const c = config[platform] || config.windows

        document.getElementById('thanksIcon').innerHTML = c.icon
        document.getElementById('thanksIcon').style.cssText += c.iconStyle
        document.getElementById('thanksSub').textContent = c.sub.replace(/<[^>]+>/g, '')
        document.getElementById('thanksSub').innerHTML = c.sub

        const stepsHtml = `
    <div class="thanks-steps-label">getting started</div>
    ${c.steps.map((s, i) => `
      <div class="thanks-step">
        <div class="thanks-step-num">${i + 1}</div>
        <div>${s.text}</div>
      </div>
    `).join('')}
  `
        document.getElementById('thanksSteps').innerHTML = stepsHtml
        document.getElementById('thanksRetry').innerHTML =
            `download didn't start? <a href="${c.retryUrl}" download>click here to retry</a>`
    </script>
</body>

</html>
